<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://chinimuruhi.github.io; img-src 'self' data:;">
  <title>IIDX 曲名サジェスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>

<header>
  <span class="header-title">IIDX SONG FINDER</span>
  <div class="theme-switcher" role="group" aria-label="テーマ切り替え">
    <button class="theme-btn" data-theme-target="light"   aria-pressed="true">LIGHT</button>
    <button class="theme-btn" data-theme-target="dark"    aria-pressed="false">DARK</button>
    <button class="theme-btn" data-theme-target="sparkle" aria-pressed="false">SPARKLE</button>
    <button class="theme-btn" data-theme-target="tricoro" aria-pressed="false">TRICORO</button>
  </div>
</header>

<main>
  <section class="search-area">
    <label class="search-label" for="searchInput">SONG TITLE SEARCH</label>
    <input
      id="searchInput"
      class="search-input"
      type="text"
      placeholder="なんとなく入力してみてください..."
      autocomplete="off"
      maxlength="100"
      aria-label="曲名検索"
    >
    <p class="search-hint">大文字小文字・記号が思い出せなくても大丈夫です</p>
  </section>

  <div class="filter-bar" role="group" aria-label="表示する楽曲のフィルター">
    <span class="filter-label">FILTER:</span>
    <button class="filter-btn" data-filter="all" aria-pressed="true"  type="button">全曲</button>
    <button class="filter-btn" data-filter="ac"  aria-pressed="false" type="button">AC版</button>
    <button class="filter-btn" data-filter="inf" aria-pressed="false" type="button">INFINITAS</button>
  </div>

  <div class="debug-toggle-wrap">
    <button class="debug-toggle" id="versionToggle" aria-pressed="false">収録バージョン表示: OFF</button>
    <button class="debug-toggle" id="debugToggle"   aria-pressed="false">スコア表示: OFF</button>
  </div>

  <div id="loadingArea" class="loading" hidden>
    <div class="loading-spinner"></div>
    <div>楽曲データを読み込んでいます...</div>
  </div>

  <div id="errorArea" class="error-msg" hidden></div>

  <section class="results-area" id="resultsArea" aria-live="polite" aria-label="検索結果"></section>
</main>

<script src="app.js" defer></script>

</body>
</html>
